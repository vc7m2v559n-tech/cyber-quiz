<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الأمن السيبراني</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #1a73e8; font-size: 20px; }
        .question { margin-bottom: 20px; font-weight: bold; }
        button { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background-color: #2ea44f; color: white; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2c974b; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>اختبار مهارات الأمن السيبراني</h1>
        <div class="question">س: أي أداة تستخدم لتحليل التشفير (Cryptography)؟</div>
        <button onclick="alert('صحيحة! CrypTool 2 هي الأداة المناسبة.')">CrypTool 2</button>
        <button onclick="alert('خطأ! Kali Linux نظام تشغيل وليس أداة تشفير مخصصة.')">Kali Linux</button>
        
        <div class="question">س: بروتوكول يستخدم لتأمين تصفح الويب؟</div>
        <button onclick="alert('إجابة ذكية! HTTPS هو الخيار الآمن.')">HTTPS</button>
        <button onclick="alert('خطأ! HTTP غير مشفر وغير آمن.')">HTTP</button>
    </div>
</body>
</html>
